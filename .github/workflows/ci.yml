name: ci
on:
  push:
    branches: ["main", "step-*"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        branch: [main, step-1, step-2, step-3, step-4, step-5, step-6]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Build the workspace with the guest dev shell
        run: |
          # aya-build prefers a rustup-managed nightly when `rustup` is on PATH.
          # GitHub runners ship rustup; remove it so aya-build falls back to the
          # flake's pinned nightly (which matches the flake's LLVM-22 bpf-linker),
          # exactly like the rustup-free Nix guest that participants use.
          rustup self uninstall -y || true
          nix develop .#guest --command cargo build --locked
